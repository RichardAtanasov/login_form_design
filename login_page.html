<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src='https://www.google.com/recaptcha/api.js'></script>
    <link rel="stylesheet" href="/styles.css">
    <link rel="javascript" href="/myapp.js">

</head>

<body>
    <form action="" class="login-box">
        <h2> Login: </h2>
        <div class="username">
            <label for="username"><sup>*</sup>Username or Email:</label>
            <br>
            <input class="input-username" type="username" placeholder="Username or Email" required>
        </div>
        <div class="password">
            <label for="Password"><sup>*</sup>Password: </label>
            <br>
            <input class="input-password" type="password" placeholder="Password" required>
        </div>
        <button class="container">Login</button>
        </div>
        <div class="g-recaptcha" data-sitekey="6LeQZ4YdAAAAADdlj1EYXuqNWR3oG8hQWwNTq44X">
        </div>
    </form>
</body>

</html>
